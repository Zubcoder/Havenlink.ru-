<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HavenLink — Спасибо за покупку</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="assets/logo.png">
</head>
<body>
  <header class="header">
    <div class="container">
      <a href="index.html" class="logo">
        <img src="assets/logo.png" alt="HavenLink">
        <span>HavenLink</span>
      </a>
    </div>
  </header>

  <main class="checkout-page" style="text-align:center">
    <div class="container">
      <div class="checkout-card">
        <h1 style="color:var(--accent)">Спасибо!</h1>
        <p>После подтверждения платежа данные для подключения будут отправлены на ваш email.</p>
        <p><strong>Thank you!</strong> Your VPN credentials will be emailed once payment is confirmed.</p>
        <a href="index.html" class="btn btn-primary" style="margin-top:16px">На главную / Home</a>
      </div>
    </div>
  </main>

  <footer class="footer" style="margin-top:0">
    <div class="container">
      <div class="footer-bottom">
        <p>© 2026 HavenLink. All rights reserved.</p>
      </div>
    </div>
  </footer>
</body>
</html>
